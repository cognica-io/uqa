name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,benchmark]"

      - name: Run benchmarks
        run: |
          python -m pytest benchmarks/ \
            --benchmark-json=benchmark-results.json \
            --benchmark-sort=name \
            -q

      - name: Detect performance regressions
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "pytest"
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Update baseline only on main branch pushes
          auto-push: ${{ github.event_name == 'push' }}
          # Alert when a benchmark is 50% slower than baseline
          alert-threshold: "150%"
          comment-on-alert: true
          # Block PRs with significant regressions
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          benchmark-data-dir-path: benchmarks-data
