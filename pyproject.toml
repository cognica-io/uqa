[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[project]
name = "uqa"
version = "0.1.0"
description = "Unified Query Algebra database prototype"
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.26",
    "hnswlib>=0.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "hypothesis>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["uqa/tests"]
